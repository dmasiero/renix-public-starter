# Keep D-Bus/systemd user services in sync with the live Sway session.
# Without this, services such as xdg-desktop-portal-gtk may inherit stale
# environment values, causing GTK apps to block while portal activation times out.
exec_always --no-startup-id systemctl --user import-environment DISPLAY WAYLAND_DISPLAY SWAYSOCK XDG_CURRENT_DESKTOP XDG_SESSION_TYPE XCURSOR_THEME XCURSOR_SIZE DOTFILES
exec_always --no-startup-id dbus-update-activation-environment --systemd DISPLAY WAYLAND_DISPLAY SWAYSOCK XDG_CURRENT_DESKTOP XDG_SESSION_TYPE XCURSOR_THEME XCURSOR_SIZE DOTFILES
