bar {
    font $sway_bar_font
    status_command $DOTFILES/bin/i3blocks-status-command
    # Disable the tray globally; prefer no status notifier icons in the bar.
    tray_output none

    colors {
        background #1e1e2e
        statusline #cdd6f4
        separator  #6c7086

        focused_workspace  #89b4fa #89b4fa #1e1e2e
        active_workspace   #313244 #313244 #cdd6f4
        inactive_workspace #1e1e2e #1e1e2e #9399b2
        urgent_workspace   #f38ba8 #f38ba8 #1e1e2e
        binding_mode       #f9e2af #f9e2af #1e1e2e
    }
}
