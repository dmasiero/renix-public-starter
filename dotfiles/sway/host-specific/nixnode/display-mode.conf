# nixnode internal panel: Samsung ATNA40HQ09-0, 2880x1800 @ 120 Hz.
# Scale 1.5 gives an effective workspace of 1920x1200.
# External monitor layouts are handled by sway-display-layout:
# - Portable: SOTSU ELITE16 directly above eDP-1 at x=0.
# - 32C Location: LG UltraGear above eDP-1, with eDP-1 centered at x=747.
# - 10B Location: Samsung LS32D80xU above eDP-1, with eDP-1 centered at x=320.
exec_always --no-startup-id $DOTFILES/bin/host-specific/nixnode/sway-display-layout --watch
