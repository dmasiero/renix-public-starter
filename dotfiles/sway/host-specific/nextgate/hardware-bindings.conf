bindsym XF86AudioLowerVolume exec --no-startup-id wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%- -l 1.0
bindsym XF86AudioRaiseVolume exec --no-startup-id wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+ -l 1.0
bindsym XF86AudioMute exec --no-startup-id wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindsym XF86AudioMicMute exec --no-startup-id wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle

# Sway/Wayland replacements for xbindkeys mouse bindings.
# X11 button10/button11 map to these evdev names under sway.
bindsym --whole-window BTN_FORWARD exec --no-startup-id sh -c 'wl-paste --primary | wl-copy'
bindsym --whole-window BTN_BACK exec --no-startup-id $DOTFILES/bin/sway-workspace-cycle

# button4/5 are vertical wheel; button6/7 are horizontal wheel/tilt on some mice.
bindsym --whole-window Ctrl+Shift+button4 exec --no-startup-id wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+ -l 1.0
bindsym --whole-window Ctrl+Shift+button5 exec --no-startup-id wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%- -l 1.0
bindsym --whole-window Ctrl+Shift+button6 exec --no-startup-id wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+ -l 1.0
bindsym --whole-window Ctrl+Shift+button7 exec --no-startup-id wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%- -l 1.0

