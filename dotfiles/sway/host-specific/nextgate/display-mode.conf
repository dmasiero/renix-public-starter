# nextgate uses a single LG UltraGear display on DP-4.
output DP-4 enable mode 5120x2160@165.058Hz transform normal position 0 0

# The same panel can also appear as DP-2 when the link topology changes; keep it off.
output DP-2 disable

# Put the initial workspaces on the only display.
workspace 1 output DP-4
workspace 2 output DP-4
workspace 3 output DP-4
workspace 4 output DP-4
