exec --no-startup-id $DOTFILES/bin/sway-idle-lock-manager
exec_always --no-startup-id env SWAY_WALLPAPER_MODE=fill $DOTFILES/bin/wallpaper-rotate --restore
# keyless currently opens the raw ALSA playback/capture device and blocks PipeWire
# from using the laptop speakers. Start it manually only when needed.
# exec --no-startup-id $DOTFILES/bin/host-specific/coregate/keyless-start
exec --no-startup-id $HOME/.config/renix/scripts/streamdeck-controls
exec_always --no-startup-id sh -c 'pkill -f "[s]way-display-watch-dp1" 2>/dev/null || true; exec $DOTFILES/bin/host-specific/coregate/sway-display-watch-dp1'
exec_always --no-startup-id $DOTFILES/bin/waycorner-start
exec_always --no-startup-id $DOTFILES/bin/cliphist-daemon
