bindsym XF86AudioLowerVolume exec --no-startup-id $DOTFILES/bin/host-specific/coregate/volume-osd down
bindsym XF86AudioRaiseVolume exec --no-startup-id $DOTFILES/bin/host-specific/coregate/volume-osd up
# Coregate's ThinkPad F4 mic-mute key also emits XF86AudioMute. Send speaker mute
# through volume-osd so real speaker mute remains speaker-only; volume-osd ignores
# the duplicate speaker event when it immediately follows an F4 mic-mute event.
bindsym XF86AudioMute exec --no-startup-id $DOTFILES/bin/host-specific/coregate/volume-osd toggle
bindsym XF86AudioMicMute exec --no-startup-id $DOTFILES/bin/host-specific/coregate/mic-mute-toggle
bindsym XF86MonBrightnessDown exec --no-startup-id $DOTFILES/bin/host-specific/coregate/brightness-osd 5%-
bindsym XF86MonBrightnessUp exec --no-startup-id $DOTFILES/bin/host-specific/coregate/brightness-osd +5%
